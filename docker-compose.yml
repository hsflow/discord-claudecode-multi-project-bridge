services:
  bridge:
    build: .
    container_name: discord-claude-bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - WORKSPACE_PATH=/workspace
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      # Host projects directory -> container workspace (CHANGE THIS to your path)
      - /path/to/your/projects:/workspace
      # Host ~/.claude -> mounted as claude user's home config (CLAUDE.md, skills, settings.json etc.)
      - ~/.claude:/home/claude/.claude
      # Persist bridge config and sessions across restarts
      - bridge-data:/home/claude/.bridge
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bridge-data:
